<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aesthetic Wall Calendar</title>
  <meta name="description" content="A professional, high-end React calendar component for assessment." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Outfit', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#4c1d95',
              900: '#1e293b',
            }
          },
          boxShadow: {
            'premium': '0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 10px 20px -5px rgba(0, 0, 0, 0.1)',
            'glow': '0 0 20px -5px rgba(59, 130, 246, 0.6)',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* -------------------------------------------------------------------------- */
    /* GLOBAL STYLES & GLASSMORPHISM                                              */
    /* -------------------------------------------------------------------------- */
    body { overflow-x: hidden; }

    .glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .dark .glass {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Custom scrollbar aesthetics */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }

    /* -------------------------------------------------------------------------- */
    /* DECORATIVE ELEMENTS                                                        */
    /* -------------------------------------------------------------------------- */
    .lined-paper {
      background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(148, 163, 184, 0.1) 31px, rgba(148, 163, 184, 0.1) 32px);
      line-height: 32px;
    }

    .spiral-binding {
      position: absolute;
      top: -10px;
      left: 12%;
      right: 12%;
      display: flex;
      justify-content: space-between;
      z-index: 50;
    }

    .binding-ring {
      width: 12px;
      height: 28px;
      background: linear-gradient(135deg, #94a3b8, #f1f5f9, #64748b);
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    /* -------------------------------------------------------------------------- */
    /* ANIMATIONS                                                                 */
    /* -------------------------------------------------------------------------- */
    @keyframes dayEntrance {
      from { opacity: 0; transform: scale(0.85) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .day-entrance { animation: dayEntrance 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* 3D perspective for flip effect */
    .perspective-container { perspective: 2000px; }
    
    .page-flip-effect {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }
    .flipping { transform: rotateX(10deg) translateY(10px) scale(0.98); opacity: 0.05; }

    /* -------------------------------------------------------------------------- */
    /* HOLIDAY UI                                                                 */
    /* -------------------------------------------------------------------------- */
    .holiday-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: #f43f5e; box-shadow: 0 0 6px #f43f5e;
      position: absolute; top: 6px; right: 6px;
    }
    .holiday-label {
      font-size: 8px; color: #f43f5e; position: absolute; bottom: 4px;
      width: 100%; text-align: center; font-weight: 800; letter-spacing: -0.2px;
      text-transform: uppercase; opacity: 0.8;
    }

    .range-cell { background: rgba(59, 130, 246, 0.08); }
    .dark .range-cell { background: rgba(59, 130, 246, 0.12); }

    .shadow-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

    @media print { .no-print { display: none !important; } }
  </style>
</head>

<body class="min-h-screen bg-gray-50 dark:bg-[#0f172a] transition-colors duration-500 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    /**
     * PREMIUM WALL CALENDAR
     * Professional React implementation for assessment.
     * 
     * Architecture: Constants -> State Hooks -> UI Components -> Main App
     */

    // --- 1. CONFIGURATION & STATIC DATA ---

    const MONTH_GALLERY = [
      ['https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?w=1200', 'https://images.unsplash.com/photo-1491002052546-bf38f186af56?w=1200', 'https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?w=1200'], // Jan (Snow)
      ['https://images.unsplash.com/photo-1477601263568-184e1c6344d1?w=1200', 'https://images.unsplash.com/photo-1544139859-0b4550da5b23?w=1200', 'https://images.unsplash.com/photo-1517030330234-94c4fa9fc8cf?w=1200'], // Feb (Winter)
      ['https://images.unsplash.com/photo-1522748906645-95d8adfd52c7?w=1200', 'https://images.unsplash.com/photo-1495107334309-fcf20504a5ab?w=1200', 'https://images.unsplash.com/photo-1521495084171-3ad639e3d5ee?w=1200'], // Mar (Spring)
      ['https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200', 'https://images.unsplash.com/photo-1496661415325-ef852f9e8e7c?w=1200', 'https://images.unsplash.com/photo-1494548162494-3d4b44bbbdad?w=1200'], // Apr (Rain)
      ['https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1200', 'https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?w=1200', 'https://images.unsplash.com/photo-1463436753175-e822ca6a7b18?w=1200'], // May (Flowers)
      ['https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200', 'https://images.unsplash.com/photo-1506929662033-75393669402d?w=1200', 'https://images.unsplash.com/photo-1501436513145-30f24e19fcc8?w=1200'], // Jun (Beach)
      ['https://images.unsplash.com/photo-1506477331477-33d5d8b3dc85?w=1200', 'https://images.unsplash.com/photo-1505221027318-98568b64e7ae?w=1200', 'https://images.unsplash.com/photo-1504512485240-df50906b3fa8?w=1200'], // Jul (Summer Coast)
      ['https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200', 'https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?w=1200', 'https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?w=1200'], // Aug (Sunset)
      ['https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200', 'https://images.unsplash.com/photo-1476820865390-c59aeeb9e191?w=1200', 'https://images.unsplash.com/photo-1473448912268-2022ce9509d8?w=1200'], // Sep (Autumn Woods)
      ['https://images.unsplash.com/photo-1503435980610-a51f3ddfee50?w=1200', 'https://images.unsplash.com/photo-1509114397022-ed747cca3f65?w=1200', 'https://images.unsplash.com/photo-1507502707541-f369a3b18502?w=1200'], // Oct (Fall Foliage)
      ['https://images.unsplash.com/photo-1476820865390-c59aeeb9e191?w=1200', 'https://images.unsplash.com/photo-1493246507139-91e8bef99c02?w=1200', 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1200'], // Nov (Moody Mist)
      ['https://images.unsplash.com/photo-1482933220747-0639943967f1?w=1200', 'https://images.unsplash.com/photo-1512143431021-ef2540d58319?w=1200', 'https://images.unsplash.com/photo-1418985991508-e47386d96a71?w=1200']  // Dec (Frosty Pines)
    ];

    const HOLIDAYS = { 
      '0-1': 'New Year', 
      '1-14': "Valentine's", 
      '2-17': 'St Patrick', 
      '6-4': 'July 4th', 
      '9-31': 'Halloween', 
      '11-25': 'Christmas' 
    };

    const MONTH_NAMES = [
      'JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 
      'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'
    ];

    const DAYS_OF_WEEK = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];

    const { useState, useEffect, useCallback, useMemo } = React;


    // --- 2. CUSTOM HOOKS ---

    /**
     * Persists generic state in LocalStorage.
     */
    function useLocalStorage(key, initialValue) {
      const [value, setValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch { return initialValue; }
      });

      useEffect(() => {
        try { window.localStorage.setItem(key, JSON.stringify(value)); } catch { }
      }, [key, value]);

      return [value, setValue];
    }

    /**
     * Logic for date range selection with click tracking.
     */
    function useDateRange() {
      const [range, setRange] = useState({ start: null, end: null, clicks: 0 });

      const handleDateClick = useCallback((date) => {
        setRange(prev => {
          if (prev.clicks === 0) return { start: date, end: null, clicks: 1 };
          if (prev.clicks === 1) {
            return date < prev.start 
              ? { start: date, end: prev.start, clicks: 2 } 
              : { start: prev.start, end: date, clicks: 2 };
          }
          return { start: date, end: null, clicks: 1 };
        });
      }, []);

      const isInRange = (d) => range.start && range.end && d > range.start && d < range.end;
      const isStart = (d) => range.start && d.getTime() === range.start.getTime();
      const isEnd = (d) => range.end && d.getTime() === range.end.getTime();

      return { range, handleDateClick, isInRange, isStart, isEnd, clearRange: () => setRange({ start: null, end: null, clicks: 0 }) };
    }

    /**
     * Generates a 42-day array for a given year/month.
     */
    function useCalendarDays(year, month) {
      return useMemo(() => {
        const first = new Date(year, month, 1);
        const last = new Date(year, month + 1, 0);
        let startDow = first.getDay();
        startDow = startDow === 0 ? 6 : startDow - 1; // Adjust to Monday base

        const days = [];
        const prevMonthLast = new Date(year, month, 0);

        // Previous spillover
        for (let i = startDow - 1; i >= 0; i--) {
          days.push({ date: new Date(year, month - 1, prevMonthLast.getDate() - i), isCurrent: false });
        }
        // Current month
        for (let d = 1; d <= last.getDate(); d++) {
          days.push({ date: new Date(year, month, d), isCurrent: true });
        }
        // Next spillover
        const remaining = 42 - days.length;
        for (let d = 1; d <= remaining; d++) {
          days.push({ date: new Date(year, month + 1, d), isCurrent: false });
        }
        return days;
      }, [year, month]);
    }


    // --- 3. UI COMPONENTS ---

    /**
     * Individual Day rendering component.
     */
    function DayCell({ day, isToday, isCurrent, isStart, isEnd, isInRange, onClick, index }) {
      const date = day.date;
      const monthDay = date.getDate();
      const holidayKey = `${date.getMonth()}-${monthDay}`;
      const hasHoliday = isCurrent ? HOLIDAYS[holidayKey] : null;
      const isWeekend = date.getDay() === 0 || date.getDay() === 6;

      let classes = 'day-cell day-entrance relative flex flex-col items-center justify-center aspect-square rounded-2xl cursor-pointer transition-all duration-300 ';
      
      if (!isCurrent) {
        classes += 'text-gray-400/20 dark:text-gray-700/30 ';
      } else if (isStart || isEnd) {
        classes += 'bg-brand-500 text-white font-bold shadow-glow scale-110 z-10 ';
      } else if (isInRange) {
        classes += 'range-cell text-brand-600 dark:text-brand-400 ';
      } else if (isToday) {
        classes += 'bg-brand-500/10 dark:bg-brand-500/20 text-brand-600 dark:text-brand-400 font-bold ring-2 ring-brand-500/30 shadow-sm ';
      } else {
        classes += (isWeekend ? 'text-gray-400 dark:text-gray-500 ' : 'text-gray-700 dark:text-gray-300 ');
        classes += 'hover:bg-gray-100 dark:hover:bg-gray-800/50 ';
      }

      return (
        <div className={classes} style={{ animationDelay: `${index * 12}ms` }} onClick={() => onClick(date)}>
          <span className="text-sm md:text-base pointer-events-none">{monthDay}</span>
          
          {hasHoliday && (
            <React.Fragment>
              <div className="holiday-dot" />
              <span className="holiday-label no-print">{hasHoliday}</span>
            </React.Fragment>
          )}

          {isToday && !isStart && !isEnd && (
            <div className="absolute bottom-2 w-1 h-1 rounded-full bg-brand-500 shadow-[0_0_8px_#3b82f6]" />
          )}
        </div>
      );
    }

    /**
     * Hero Header with automatic slideshow functionality.
     */
    function HeroSection({ month, year, onPrev, onNext, isFlipping }) {
      const [slideIdx, setSlideIdx] = useState(0);

      useEffect(() => {
        const slideshowTimer = setInterval(() => setSlideIdx(s => (s + 1) % 3), 10000);
        return () => clearInterval(slideshowTimer);
      }, []);

      useEffect(() => setSlideIdx(0), [month]);

      return (
        <div 
          className={`relative w-full overflow-hidden rounded-t-[2.5rem] transition-all duration-700 ${isFlipping ? 'opacity-0 scale-105' : 'opacity-100 scale-100'}`} 
          style={{ aspectRatio: '21/9', minHeight: '220px' }}
        >
          {/* Animated Slideshow */}
          <div className="absolute inset-0 w-full h-full bg-slate-200 dark:bg-slate-900 shadow-inner">
             {MONTH_GALLERY[month].map((img, i) => (
               <img 
                 key={img} src={img} alt="Landscape" 
                 className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ${i === slideIdx ? 'opacity-100' : 'opacity-0'}`} 
               />
             ))}
          </div>

          <svg className="absolute inset-0 w-full h-full" viewBox="0 0 1000 400" preserveAspectRatio="none">
            <polygon points="550,0 1000,0 1000,400 400,400" fill="#3b82f6" fillOpacity="0.85" />
            <polygon points="570,0 1000,0 1000,400 420,400" fill="#2563eb" fillOpacity="0.6" />
          </svg>

          <div className="absolute inset-0 flex flex-col items-end justify-center pr-12 md:pr-24 z-10 text-white select-none">
            <span className="font-display text-sm md:text-xl font-bold tracking-[0.3em] opacity-80 mb-2">{year}</span>
            <h1 className="font-display text-5xl md:text-8xl font-black uppercase tracking-tighter leading-none shadow-sm">{MONTH_NAMES[month]}</h1>
          </div>

          <div className="absolute inset-0 flex items-center justify-between px-6 z-20 no-print">
            <button onClick={onPrev} className="p-3 rounded-full bg-black/10 hover:bg-black/20 text-white backdrop-blur-sm transition-all hover:scale-110 active:scale-95">
              <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button onClick={onNext} className="p-3 rounded-full bg-black/10 hover:bg-black/20 text-white backdrop-blur-sm transition-all hover:scale-110 active:scale-95">
              <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      );
    }


    // --- 4. MAIN ENGINE ---

    function CalendarCard() {
      const [darkPreference, setDarkPreference] = useLocalStorage('app-dark-preference', false);
      const [vM, setVM] = useState(new Date().getMonth());
      const [vY, setVY] = useState(new Date().getFullYear());
      const [isFlipping, setIsFlipping] = useState(false);
      
      const rangeControl = useDateRange();
      const [notes, setNotes] = useLocalStorage(`notes-store-${vY}-${vM}`, '');

      useEffect(() => { document.documentElement.classList.toggle('dark', darkPreference); }, [darkPreference]);

      const triggerFlip = (fn) => {
        setIsFlipping(true);
        setTimeout(() => { fn(); setIsFlipping(false); }, 300);
      };

      const handlePrev = () => triggerFlip(() => setVM(m => m === 0 ? (setVY(vY-1), 11) : m - 1));
      const handleNext = () => triggerFlip(() => setVM(m => m === 11 ? (setVY(vY+1), 0) : m + 1));
      const handleToday = () => triggerFlip(() => { const t = new Date(); setVM(t.getMonth()); setVY(t.getFullYear()); });

      const calendarDays = useCalendarDays(vY, vM);
      const today = new Date(); today.setHours(0,0,0,0);

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-gray-50 dark:bg-[#0f172a] transition-colors duration-500">
          
          {/* Theme Toggle */}
          <button 
            onClick={() => setDarkPreference(!darkPreference)} 
            className="fixed top-8 right-8 z-50 p-4 glass rounded-2xl shadow-premium no-print transition-all hover:rotate-6 active:scale-95"
          >
            {darkPreference ? '🌙' : '☀️'}
          </button>

          <div className="w-full max-w-5xl relative">
            {/* Spiral binding aesthetics */}
            <div className="spiral-binding">
              {Array.from({length:11}).map((_,i) => <div key={i} className="binding-ring" />)}
            </div>
            
            <div className="bg-white dark:bg-[#1e293b] rounded-[2.5rem] shadow-premium overflow-hidden border dark:border-white/5 transition-all">
              <HeroSection month={vM} year={vY} onPrev={handlePrev} onNext={handleNext} isFlipping={isFlipping} />
              
              <div className="flex flex-col md:flex-row p-10 lg:p-14 gap-12">
                
                {/* Information Sidebar */}
                <div className="md:w-[260px] flex flex-col h-[400px] border-r border-gray-100 dark:border-gray-800 pr-8">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Personal Notes</h2>
                  </div>
                  <textarea 
                    className="flex-1 lined-paper bg-transparent resize-none text-[13px] text-gray-600 dark:text-gray-300 focus:outline-none placeholder:text-gray-300 dark:placeholder:text-gray-600" 
                    placeholder="Capture your thoughts..." 
                    value={notes} 
                    onChange={(e)=>setNotes(e.target.value)} 
                  />
                </div>

                {/* Interactive Calendar Body */}
                <div className={`flex-1 transition-all duration-300 ${isFlipping ? 'opacity-0 translate-y-4 scale-95' : 'opacity-100'}`}>
                  <div className="flex justify-between items-center mb-10">
                    <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em] flex items-center gap-3">
                      Project Timeline
                      <span className="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>
                    </h3>
                    <button onClick={handleToday} className="text-[11px] font-bold text-brand-500 hover:scale-105 transition-all uppercase tracking-widest">● Today</button>
                  </div>
                  
                  {/* Grid Headers */}
                  <div className="grid grid-cols-7 gap-x-2 text-center text-[10px] font-black text-gray-400 mb-6 tracking-widest border-b pb-2 dark:border-gray-800">
                    {DAYS_OF_WEEK.map(h => <div key={h}>{h}</div>)}
                  </div>
                  
                  {/* Grid Content */}
                  <div className="grid grid-cols-7 gap-x-2 gap-y-2">
                    {calendarDays.map((d,i) => (
                      <DayCell 
                        key={i} index={i} day={d} 
                        isToday={d.isCurrent && d.date.getTime()===today.getTime()} 
                        isCurrent={d.isCurrent} isStart={rangeControl.isStart(d.date)} 
                        isEnd={rangeControl.isEnd(d.date)} isInRange={rangeControl.isInRange(d.date)} 
                        onClick={rangeControl.handleDateClick}
                      />
                    ))}
                  </div>
                </div>
              </div>

              {/* Selection Summary Utility */}
              {rangeControl.range.start && (
                <div className="px-10 py-5 bg-gray-50/50 dark:bg-black/20 border-t border-gray-100 dark:border-white/5 flex justify-between items-center no-print">
                  <div className="flex items-center gap-4 text-xs font-bold text-gray-500 dark:text-gray-400">
                    <span className="text-brand-500">{rangeControl.range.start.toDateString()}</span>
                    {rangeControl.range.end && (
                      <React.Fragment>
                        <span>→</span>
                        <span className="text-brand-500">{rangeControl.range.end.toDateString()}</span> 
                        <span className="opacity-50 font-medium tracking-tight">({Math.round((rangeControl.range.end-rangeControl.range.start)/86400000)+1} days)</span>
                      </React.Fragment>
                    )}
                  </div>
                  <button onClick={rangeControl.clearRange} className="text-[10px] font-black uppercase text-brand-500 tracking-widest hover:text-brand-700 transition-all">Clear Selection</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- 5. RENDER ENTRY ---
    const appRoot = ReactDOM.createRoot(document.getElementById('root'));
    appRoot.render(<CalendarCard />);
  </script>
</body>
</html>
